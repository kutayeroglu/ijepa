data:
  batch_size: 32
  color_jitter_strength: 0.0
  crop_scale:
  - 0.3
  - 1.0
  crop_size: 224
  image_folder: ""
  num_workers: 10
  pin_mem: true
  root_path: /mnt/data/imagenet
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false
  # train_fraction: 1.0
logging:
  folder: /mnt/logs/ijepa/pretraining
  write_tag: balon_mblock_vitb
mask:
  allow_overlap: false
  aspect_ratio:
  - 0.75
  - 1.5
  enc_mask_scale:
  - 0.85
  - 1.0
  min_keep: 10
  num_enc_masks: 1
  num_pred_masks: 4
  patch_size: 16
  pred_mask_scale:
  - 0.15
  - 0.2
  mask_type: multiblock
meta:
  copy_data: false
  load_checkpoint: false
  model_name: vit_base
  pred_depth: 6
  pred_emb_dim: 384
  read_checkpoint: null
  use_bfloat16: true
optimization:
  ema:
  - 0.996
  - 1.0
  epochs: 100
  final_lr: 6.25e-08
  final_weight_decay: 0.4
  ipe_scale: 1.0
  lr: 6.25e-05
  start_lr: 6.25e-06
  warmup: 15
  weight_decay: 0.04
