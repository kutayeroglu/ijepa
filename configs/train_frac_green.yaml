  use_bfloat16: true
optimization:
  ema:
  - 0.996
  - 1.0
  epochs: 30
  final_lr: 7.8e-09
  final_weight_decay: 0.4
  ipe_scale: 1.0
  lr: 7.8e-07
  start_lr: 7.8e-06
