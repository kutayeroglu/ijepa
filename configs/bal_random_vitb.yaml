data:
  batch_size: 128
  color_jitter_strength: 0.0
  crop_scale:
  - 0.3
  - 1.0
  crop_size: 224
  image_folder: ""
  num_workers: 20
  pin_mem: true
  root_path: /mnt/data/imagenet
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false
logging:
  folder: /mnt/logs/ijepa/pretraining
  write_tag: bal_random_vitb
mask:
  mask_type: random
  mask_ratio:
  - 0.4
  - 0.6
  patch_size: 16
meta:
  copy_data: false
  load_checkpoint: false
  model_name: vit_base
  pred_depth: 6
  pred_emb_dim: 384
  read_checkpoint: null
  use_bfloat16: true
optimization:
  ema:
  - 0.996
  - 1.0
  epochs: 100
  final_lr: 2.5e-07
  final_weight_decay: 0.4
  ipe_scale: 1.0
  lr: 2.5e-04
  start_lr: 2.5e-05
  warmup: 15
  weight_decay: 0.04
